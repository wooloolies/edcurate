default_output_dir: .agents/results/images
default_vendor: auto
default_size: 1024x1024
default_quality: auto
default_count: 1
default_timeout_sec: 180

vendors:
  codex:
    enabled: true
    model: gpt-image-2
    extra_args: []
  gemini:
    # Disabled by default — Gemini image models require billing on AI Studio
    # or Vertex AI. Flip to true after enabling billing + setting GEMINI_API_KEY.
    enabled: false
    model: gemini-2.5-flash-image
    strategies:
      - mcp
      - stream
      - api
  pollinations:
    enabled: true
    model: flux

cost_guardrail:
  estimate_threshold_usd: 0.20
  per_image_usd:
    codex:
      gpt-image-2:
        low: 0.02
        medium: 0.03
        high: 0.04
        auto: 0.03
    gemini:
      gemini-2.5-flash-image:
        low: 0.04
        medium: 0.04
        high: 0.04
        auto: 0.04

compare:
  folder_pattern: "{timestamp}-{shortid}-compare"
  manifest: true

naming:
  single_folder_pattern: "{timestamp}-{shortid}"
